<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        tbody > tr:nth-child(2n) {
            background-color: lightgrey;
        }


        table {
            width: 400px;
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            height: 1800px;
            position: relative;
        }

        caption {
            font-weight: bold;
            border: 1px solid black;
            background-color: grey;
            color: white;
            padding: 20px;
        }

        th {
            border: 1px solid black;
            height: 50px;
        }

        thead > tr > th {
            position: sticky;
            top: -1px;
            background-color: grey;
        }
        thead {
            background-color: grey;
            color: white;
        }

        td {
            border: 1px solid black;
        }

        .td-newtab::after {
            content: url(newtabicon.png);
            vertical-align: middle;
        }

        .td-newtab:hover {
            text-decoration: underline;
            cursor: pointer;
        }

        tfoot {
            background-color: grey;
            color: white;
        }
        
    </style>
</head>
<body>
    <table>
        <caption>População das Unidades Federativas</caption>
        <thead>
            <th scope="col">Estado</th>
            <th scope="col">População</th>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td>45.919.649</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td>21.168.791</td>
            </tr>
            <tr>
                <td class="td-newtab">Rio de Janeiro</td>
                <td>17.264.943</td>
            </tr>
            <tr>
                <td class="td-newtab">Bahia</td>
                <td>1.189.992</td>
            </tr>
            <tr>
                <td>Goias</td>
                <td>798.000</td>
            </tr>
            <tr>
                <td>Espirito-Santo</td>
                <td>2.378.281</td>
            </tr>
            <tr>
                <td>Paraná</td>
                <td>998.982</td>
            </tr>
            <tr>
                <td>Recife</td>
                <td>9.876.235</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total de habitantes</td>
                <th><strong>120.892.034</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
