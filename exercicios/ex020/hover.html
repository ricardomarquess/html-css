<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: wheat;
            background-color: black;
            width: 200px;
        }

        div:hover{
            color: red;
        }
    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>Passe o mouse na div</p>
    <div>
        Passe o mouse aqui
        <p>Texto Secreto hihi</p>
    </div>
</body>
</html>
