<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* all */
        h1 {
            text-align: center;
            padding: 2rem;
            background: rgb(86, 30, 240);
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            border-radius: 15px;
            width: 50%;
        }

        img {
            width: 100%;
        }
        
        /* portrait */
        @media screen and (orientation: portrait) {
            .landscape {
                display: none;
            }

            .portrait {
                display: block;
            }      
        }

        /* landscape */
        @media screen and (orientation: landscape) {
            .landscape {
                display: block;
            }

            .portrait {
                display: none;;
            } 
        }
    </style>
</head>
<body>
    <h1>Gira a tela do celular</h1>
    <div class="landscape">
        <img src="../imagens/cev-landscape.jpg" alt="cevlandscape">
    </div>
    <div class="portrait">
        <img src="../imagens/cev-portrait.jpg" alt="cevportrait">
    </div>
</body>
</html>
