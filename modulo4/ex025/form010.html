<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <div>
            <label for="ano">Ano:</label>
            <input type="number" name="ano" id="iano" min="1900" max="2026" oninput="calcIdade()">
        </div>
        <div>
            <label for="iidade">Idade:</label>
            <output id="iidade">0</output>
        </div>
    </form>
    <script>
        function calcIdade() {
            let atual = new Date().getFullYear();
            iidade.innerHTML = Number(atual) - Number(iano.value)
        }
    </script>
</body>
</html>
